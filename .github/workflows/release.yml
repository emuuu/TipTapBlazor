name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: TipTapBlazor/package-lock.json
      - run: npm ci
        working-directory: TipTapBlazor
      - run: npm run build
        working-directory: TipTapBlazor
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build
        working-directory: tests/TipTapBlazor.Tests
      - name: Extract version from tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v ]]; then
            echo "::error::This workflow must be triggered by a tag matching 'v*', got: $GITHUB_REF_NAME"
            exit 1
          fi
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Find previous release tag
        id: prev-tag
        run: |
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            echo "NOTES_START_TAG=--notes-start-tag $PREV_TAG" >> $GITHUB_OUTPUT
          else
            echo "NOTES_START_TAG=" >> $GITHUB_OUTPUT
          fi
      - name: Pack
        run: dotnet pack TipTapBlazor/TipTapBlazor.csproj -c Release --no-build -p:Version=$VERSION -o ./artifacts
      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg --skip-duplicate -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }}
          dotnet nuget push ./artifacts/*.snupkg --skip-duplicate -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *"-preview"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create ${{ github.ref_name }} ./artifacts/*.nupkg \
            --generate-notes ${{ steps.prev-tag.outputs.NOTES_START_TAG }} \
            $PRERELEASE_FLAG \
            --title "TipTapBlazor v$VERSION"
