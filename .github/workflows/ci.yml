name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']
        include:
          - dotnet-version: '8.0.x'
            target-framework: net8.0
          - dotnet-version: '9.0.x'
            target-framework: net9.0
          - dotnet-version: '10.0.x'
            target-framework: net10.0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: TipTapBlazor/package-lock.json
      - run: npm ci
        working-directory: TipTapBlazor
      - run: npm run build
        working-directory: TipTapBlazor
      - run: dotnet restore
      - run: dotnet build -c Release -f ${{ matrix.target-framework }} --no-restore
        working-directory: tests/TipTapBlazor.Tests
      - run: dotnet test -c Release -f ${{ matrix.target-framework }} --no-build
        working-directory: tests/TipTapBlazor.Tests
